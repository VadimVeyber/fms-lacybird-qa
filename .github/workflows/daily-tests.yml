# scheduler-reset: 2026-04-23
name: Daily ERP Tests

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @playwright/test && npx playwright install chromium --with-deps
        working-directory: tests

      - name: Restore auth session
        env:
          FMS_AUTH_STATE: ${{ secrets.FMS_AUTH_STATE }}
        run: echo "$FMS_AUTH_STATE" > /tmp/fms-auth-state.json

      - name: Sync test plan from Google Sheets
        run: node scripts/sync-plan.js

      - name: Run tests
        run: npx playwright test --config=playwright.config.js
        working-directory: tests

      - name: Save report
        if: always()
        run: |
          mkdir -p reports
          echo "Last run $(date -u '+%Y-%m-%d %H:%M') UTC" > reports/last-run.md

      - name: Write results to Google Sheets
        if: always()
        env:
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          REPORT_PATH: /tmp/fms-tests/results.json
        run: node scripts/write-results.js

      - name: Generate PDF report
        if: always()
        env:
          REPORT_PATH: /tmp/fms-tests/results.json
          PDF_OUTPUT: /tmp/fms-tests/report.pdf
        run: node ../scripts/generate-report.js
        working-directory: tests

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/ reports/ || true
          git diff --staged --quiet || git commit -m "auto: tests $(date -u '+%Y-%m-%d')"
          git pull --rebase
          git push

      - name: Notify Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/VadimVeyber/fms-lacybird-qa/actions/runs/${{ github.run_id }}
          STATUS: ${{ job.status }}
          REPORT_PATH: /tmp/fms-tests/results.json
          PDF_PATH: /tmp/fms-tests/report.pdf
        run: |
          TIMESTAMP=$(date -u '+%d.%m.%Y %H:%M')
          PASSED=0
          FAILED=0
          TOTAL=0
          if [ -f "$REPORT_PATH" ]; then
            PASSED=$(node -e "const r=require('$REPORT_PATH'); const c=s=>s.specs?(s.specs.reduce((a,sp)=>a+(sp.tests[0]?.results[0]?.status==='passed'?1:0),0)+(s.suites||[]).reduce((a,s2)=>a+c(s2),0)):0; console.log(r.suites.reduce((a,s)=>a+c(s),0))" 2>/dev/null || echo 0)
            FAILED=$(node -e "const r=require('$REPORT_PATH'); const c=s=>s.specs?(s.specs.reduce((a,sp)=>a+(sp.tests[0]?.results[0]?.status==='failed'?1:0),0)+(s.suites||[]).reduce((a,s2)=>a+c(s2),0)):0; console.log(r.suites.reduce((a,s)=>a+c(s),0))" 2>/dev/null || echo 0)
            TOTAL=$((PASSED + FAILED))
          fi
          if [ "$FAILED" = "0" ]; then
            ICON="🟢"
            LABEL="Все тесты прошли"
          else
            ICON="🔴"
            LABEL="Упало тестов: $FAILED"
          fi
          MSG="${ICON} FMS Tests — ${TIMESTAMP}
${LABEL}

📊 Прошло: ${PASSED} / ${TOTAL}
📁 Результаты в репозитории
🔗 ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}"
          if [ -f "$PDF_PATH" ]; then
            FNAME="fms-report-$(date -u '+%Y-%m-%d_%H-%M').pdf"
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument" \
              -F "chat_id=${CHAT_ID}" \
              -F "document=@${PDF_PATH};filename=${FNAME}"
          fi
