name: Daily ERP Tests

on:
  schedule:
    - cron: '0 6 * * *'  # 9:00 по Москве каждый день
  workflow_dispatch:       # ручной запуск через GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd tests
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Restore auth session
        env:
          FMS_AUTH_STATE: ${{ secrets.FMS_AUTH_STATE }}
        run: echo "$FMS_AUTH_STATE" > /tmp/fms-auth-state.json

      - name: Run tests
        run: |
          cd tests
          npx playwright test --config=playwright.config.js
        env:
          SCREENSHOTS_DIR: ${{ github.workspace }}/screenshots

      - name: Generate report
        if: always()
        run: |
          mkdir -p reports
          DATE=$(TZ='Europe/Moscow' date '+%d.%m.%Y %H:%M')
          echo "## Последний прогон: ${DATE} МСК" > reports/last-run.md
          echo "" >> reports/last-run.md
          echo "Запущено: GitHub Actions (daily schedule)" >> reports/last-run.md

      - name: Commit and push results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/ reports/
          git diff --staged --quiet || git commit -m "auto: тесты $(TZ='Europe/Moscow' date '+%d.%m.%Y')"
          git push

      - name: Notify Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_ID: ${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          DATE=$(TZ='Europe/Moscow' date '+%d.%m.%Y %H:%M')
          if [ "$JOB_STATUS" = "success" ]; then
            ICON="✅"
            LABEL="Все тесты прошли"
          else
            ICON="🔴"
            LABEL="Есть упавшие тесты"
          fi
          TEXT="${ICON} FMS Tests (CI) — ${DATE} МСК
${LABEL}

Лог: https://github.com/VadimVeyber/fms-lacybird-qa/actions/runs/${RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            -d "parse_mode=HTML"
